spring.application.name=EStudyServer

# MySQL 数据库连接（createDatabaseIfNotExist 自动创建库）
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3308/estudy?serverTimezone=GMT%2B8&useUnicode=true&characterEncoding=utf-8&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=wangyue1202

# JPA/Hibernate 自动建表
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# 文件上传大小限制（20MB）
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

file.upload-path=./uploads/