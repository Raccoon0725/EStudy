# Alembic configuration for StudyQuest Agent
# Located at Agent/alembic.ini, relative paths are from this directory

[alembic]
script_location = alembic
version_locations = alembic/versions
sqlalchemy.url = mysql+pymysql://root:changeme@localhost:3306/estudy?charset=utf8mb4

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
